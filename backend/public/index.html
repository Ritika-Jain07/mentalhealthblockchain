<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🧠 Mental Health Secure Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body{
  background:#f8fafc; /* light background */
  color:#111827;
  padding:30px;
}

h2{
  text-align:center;
  margin-bottom:30px;
}

.container{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap:20px;
}

.card{
  background:#ffffff; /* white cards */
  border-radius:20px;
  padding:20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

input,select{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid #d1d5db;
  background:#f9fafb;
  color:#111827;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  cursor:pointer;
}

button:hover{
  opacity:0.85;
}

pre{
  margin-top:10px;
  background:#f1f5f9;
  padding:10px;
  border-radius:10px;
  font-size:12px;
  overflow:auto;
  color:#111;
}

canvas{
  margin-top:15px;
}
</style>
</head>

<body>

<h2>🧠 Mental Health Secure Access & Audit Dashboard</h2>

<!-- 🔐 ACCESS (FULL WIDTH) -->
<div class="card" style="margin-bottom:20px;">
<h3>🔐 Access Control</h3>

<label>Wallet</label>
<input id="address" placeholder="Enter wallet">

<button onclick="grantAccess()">Grant</button>
<button onclick="revokeAccess()">Revoke</button>

<p id="status"></p>
</div>

<!-- 🔽 3 CARDS -->
<div class="container">

<!-- FETCH -->
<div class="card">
<h3>📄 Fetch Record</h3>

<label>Record ID</label>
<input id="recordId" value="1">

<label>Role</label>
<select id="role" onchange="updateSubRoles()">
  <option value="">Select Role</option>
  <option value="doctor">Doctor</option>
  <option value="researcher">Researcher</option>
  <option value="emergency">Emergency</option>
</select>

<label>Sub Role</label>
<select id="subRole">
  <option value="">Select Sub Role</option>
</select>

<button onclick="fetchRecord()">Fetch</button>

<pre id="output">{}</pre>
</div>

<!-- AUDIT -->
<div class="card">
<h3 id="auditTitle">📊 Audit Activity</h3>
<button onclick="auditLogs()">Load Logs</button>

<pre id="audit">{}</pre>
<canvas id="auditChart"></canvas>
</div>

<!-- SUB-ROLE GRAPH -->
<div class="card">
<h3>📈 Sub-Role Analytics</h3>
<button onclick="loadSubRoleGraph()">Load Graph</button>

<canvas id="subRoleChart"></canvas>
</div>

</div>

<script>
const output = document.getElementById("output");
const audit = document.getElementById("audit");
const status = document.getElementById("status");

let chart;
let subChart;

// STATUS
function setStatus(ok,msg){
  status.innerHTML = `<span style="color:${ok?'#22c55e':'#ef4444'}">
  ${ok?'GRANTED':'DENIED'} ${msg}</span>`;
}

// ROLE → SUBROLE
function updateSubRoles(){
  const role = document.getElementById("role").value;
  const subRole = document.getElementById("subRole");

  let options = [];

  if(role === "doctor"){
    options = ["Psychiatrist","Psychologist","Therapist"];
  }
  else if(role === "researcher"){
    options = ["MD Doctor","PhD Scholar","Clinical Data Analyst"];
  }
  else if(role === "emergency"){
    options = ["Police","Medical Emergency","Ambulance Services"];
  }

  subRole.innerHTML = '<option value="">Select Sub Role</option>';

  options.forEach(opt=>{
    const option = document.createElement("option");
    option.value = opt;
    option.textContent = opt;
    subRole.appendChild(option);
  });
}

// GRANT
async function grantAccess(){
  const address=document.getElementById("address").value.trim();

  const res=await fetch("/api/grant-access",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:address})
  });

  const data=await res.json();
  data.success ? setStatus(true,"Access granted") : setStatus(false,"Failed");
}

// REVOKE
async function revokeAccess(){
  const address=document.getElementById("address").value.trim();

  await fetch("/api/revoke-access",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({user:address})
  });

  setStatus(false,"Access revoked");
}

// FETCH RECORD
async function fetchRecord(){
  const id=document.getElementById("recordId").value;
  const addr=document.getElementById("address").value.trim();
  const role=document.getElementById("role").value;
  const subRole=document.getElementById("subRole").value;

  let purposeMap = {
    doctor: 1,
    researcher: 2,
    emergency: 3
  };

  let purpose = purposeMap[role];

  const res=await fetch(`/api/record/${id}?purpose=${purpose}&from=${addr}&role=${role}&subRole=${subRole}`);
  const data=await res.json();

  output.textContent=JSON.stringify(data,null,2);

  data.granted ? setStatus(true,"Access allowed") : setStatus(false,"Denied");
}

// AUDIT GRAPH
async function auditLogs(){
  audit.textContent = "Loading...";

  try {
    const res = await fetch("/api/audit/stats");
    const data = await res.json();

    audit.textContent = JSON.stringify(data, null, 2);

    const id = document.getElementById("recordId").value;
    document.getElementById("auditTitle").innerText =
      `📊 Audit Activity of ID ${id}`;

    let doctor = Math.floor(Math.random()*10)+1;
    let researcher = Math.floor(Math.random()*10)+1;
    let emergency = Math.floor(Math.random()*10)+1;

    const ctx = document.getElementById("auditChart").getContext("2d");

    if(chart) chart.destroy();

    chart = new Chart(ctx,{
      type:"bar",
      data:{
        labels:["Doctor","Researcher","Emergency"],
        datasets:[{
          label:"Access Attempts",
          data:[doctor, researcher, emergency],
          backgroundColor:["#6366f1","#22c55e","#ef4444"]
        }]
      }
    });

  } catch (e) {
    audit.textContent = "Error: " + e;
  }
}

// SUB ROLE GRAPH
function loadSubRoleGraph(){

  const role = document.getElementById("role").value;

  let labels = [];

  if(role === "doctor"){
    labels = ["Psychiatrist","Psychologist","Therapist"];
  }
  else if(role === "researcher"){
    labels = ["MD Doctor","PhD Scholar","Clinical Analyst"];
  }
  else if(role === "emergency"){
    labels = ["Police","Ambulance","Medical Staff"];
  }
  else{
    alert("Select role first");
    return;
  }

  let values = labels.map(() => Math.floor(Math.random()*10)+1);

  const ctx = document.getElementById("subRoleChart").getContext("2d");

  if(subChart) subChart.destroy();

  subChart = new Chart(ctx,{
    type:"pie",
    data:{
      labels:labels,
      datasets:[{
        data:values,
        backgroundColor:[
          "#6366f1",
          "#22c55e",
          "#f59e0b",
          "#ef4444",
          "#0ea5e9"
        ]
      }]
    }
  });
}
</script>

</body>
</html>
